<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Station Tracker</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff9800; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        .hidden { display: none; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .big-text { font-size: 2.5rem; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .btn { background: var(--accent); border: none; padding: 15px 30px; border-radius: 10px; color: black; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        #track-line { height: 10px; background: #333; border-radius: 5px; position: relative; margin: 30px 0; }
        #user-pos { position: absolute; top: -10px; width: 30px; height: 30px; background: red; border-radius: 50%; border: 3px solid white; transform: translateX(-50%); }
    </style>
</head>
<body>

    <div id="step-1" class="card">
        <h2>दिशा चुनें (Select Direction)</h2>
        <button class="btn" onclick="startApp('up')">Up (Manabar → Bacheli)</button>
        <button class="btn" onclick="startApp('down')">Down (Bacheli → Manabar)</button>
    </div>

    <div id="step-2" class="hidden">
        <div class="card">
            <div>Next Station</div>
            <div id="station-name" class="big-text">Loading...</div>
            <div id="distance" class="big-text" style="font-size: 1.5rem;">0.0 km</div>
        </div>

        <div class="card">
            <label>Alarm Distance (km): </label>
            <input type="number" id="alarm-dist" value="2" style="width: 50px; padding: 5px;">
            <button class="btn" onclick="setGlobalAlarm()">Set Alarm for All</button>
        </div>

        <div class="card">
            <h3>रूट प्रोग्रेस</h3>
            <div id="track-line">
                <div id="user-pos"></div>
            </div>
            <p id="status-msg">GPS का इंतज़ार है...</p>
        </div>
    </div>

    <script>
        const stations = [
            {"station":"Manabar","lat":18.840492,"lon":82.695571},
            {"station":"Jarati","lat":18.891874,"lon":82.665381},
            {"station":"Maligura","lat":18.953505,"lon":82.638622},
            {"station":"Chattariput","lat":18.922689,"lon":82.590097},
            {"station":"Jeypore","lat":18.895231,"lon":82.555724},
            {"station":"Dhanapur","lat":18.942042,"lon":82.513883},
            {"station":"Khadapa","lat":18.982736,"lon":82.468617},
            {"station":"Charamula Kusumi","lat":19.01612,"lon":82.415111},
            {"station":"Kotapar Road","lat":19.041657,"lon":82.307835},
            {"station":"Amagura","lat":19.068659,"lon":82.147901},
            {"station":"Nakti Semra","lat":19.061776,"lon":82.073807},
            {"station":"Jagdalpur","lat":19.066038,"lon":82.01414},
            {"station":"Kumhar Marenga","lat":19.034652,"lon":81.946605},
            {"station":"Tokapal","lat":19.006474,"lon":81.878587},
            {"station":"Bade Arapur","lat":19.012629,"lon":81.828722},
            {"station":"Dilmili","lat":18.987838,"lon":81.737704},
            {"station":"Silak Jhori","lat":18.977709,"lon":81.67065},
            {"station":"Kumar Sodra","lat":18.919577,"lon":81.686003},
            {"station":"Kaklur","lat":18.883297,"lon":81.620983},
            {"station":"Dabpal","lat":18.928082,"18.928082":81.488991},
            {"station":"Gidam","lat":18.936727,"lon":81.412305},
            {"station":"Dantewara","lat":18.908166,"lon":81.355817},
            {"station":"Bacheli","lat":18.703747,"lon":81.238185}
        ];

        let route = [];
        let alarmDistance = 2;

        function startApp(dir) {
            route = dir === 'up' ? [...stations] : [...stations].reverse();
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            trackLocation();
        }

        function trackLocation() {
            if (!navigator.geolocation) return alert("GPS not supported");
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                updateUI(latitude, longitude);
            }, err => console.error(err), { enableHighAccuracy: true });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI / 180;
            const dLon = (lon2-lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function updateUI(uLat, uLon) {
            let nextStation = null;
            let minDist = Infinity;

            // अगले स्टेशन की पहचान (सबसे पास वाला जो आगे है)
            for(let s of route) {
                let d = calculateDistance(uLat, uLon, s.lat, s.lon);
                // यहाँ हम लॉजिक लगा सकते हैं कि कौन सा स्टेशन बीत चुका है
                if(d < minDist) {
                    minDist = d;
                    nextStation = s;
                }
            }

            if(nextStation) {
                document.getElementById('station-name').innerText = nextStation.station;
                document.getElementById('distance').innerText = minDist.toFixed(2) + " km";
                
                if(minDist <= alarmDistance) {
                    triggerAlarm(nextStation.station);
                }
            }
        }

        function triggerAlarm(name) {
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            // Sound play logic can be added here
            document.getElementById('status-msg').innerText = "ALERT: " + name + " करीब है!";
        }

        function setGlobalAlarm() {
            alarmDistance = parseFloat(document.getElementById('alarm-dist').value);
            alert("अलार्म " + alarmDistance + " किमी पर सेट किया गया।");
        }
    </script>
</body>
</html>
